        :root {
            --bg-color: #0d1117;
            --panel-bg: rgba(22, 27, 34, 0.8);
            --border-color: #30363d;
            --text-color: #c9d1d9;
            --text-muted: #8b949e;
            --primary: #58a6ff;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-orange: #f0883e;
            --sidebar-width: 320px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar styling */
        .sidebar {
            width: var(--sidebar-width);
            background-color: #161b22;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100%;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-header h1 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 5px;
        }

        .sidebar-header p {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .search-box {
            padding: 10px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .search-box input {
            width: 100%;
            padding: 8px 12px;
            background-color: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
        }

        .search-box input:focus {
            border-color: var(--primary);
        }

        .video-list {
            flex-grow: 1;
            overflow-y: auto;
            list-style: none;
        }

        .video-item {
            padding: 12px 20px;
            border-bottom: 1px solid #21262d;
            cursor: pointer;
            transition: background 0.2s;
        }

        .video-item:hover {
            background-color: rgba(88, 166, 255, 0.1);
        }

        .video-item.active {
            background-color: rgba(88, 166, 255, 0.15);
            border-left: 4px solid var(--primary);
        }

        .video-item-id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .video-item-title {
            font-size: 0.9rem;
            font-weight: 500;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 3px;
        }

        .video-item-badge {
            display: inline-block;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 10px;
            background-color: var(--border-color);
            color: var(--text-color);
            margin-top: 5px;
        }

        .video-item-badge.perfect {
            background-color: rgba(63, 185, 80, 0.2);
            color: #56d364;
        }

        /* Main Content Panel */
        .content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow-y: auto;
            background-color: #0d1117;
            padding: 30px;
        }

        .no-selection {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
        }

        .no-selection h2 {
            margin-bottom: 10px;
            color: #fff;
        }

        .video-panel {
            display: none;
        }

        .video-panel.active {
            display: block;
        }

        .panel-header {
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .panel-header h2 {
            font-size: 1.8rem;
            color: #fff;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .panel-meta {
            display: flex;
            gap: 15px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .panel-meta span strong {
            color: #fff;
        }

        /* Metrics grid */
        .metrics-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .metrics-card {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
        }

        .metrics-card h3 {
            font-size: 1.1rem;
            color: #fff;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .metrics-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .metrics-table th, .metrics-table td {
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid #21262d;
        }

        .metrics-table th {
            color: var(--text-muted);
            font-weight: 500;
        }

        .metrics-table tr:last-child th, .metrics-table tr:last-child td {
            border-bottom: none;
        }

        .badge-score {
            font-family: 'JetBrains Mono', monospace;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }

        .badge-score.high {
            background-color: rgba(63, 185, 80, 0.15);
            color: #56d364;
        }

        .badge-score.med {
            background-color: rgba(240, 136, 62, 0.15);
            color: #ff9e64;
        }

        .badge-score.low {
            background-color: rgba(248, 81, 73, 0.15);
            color: #ff7b72;
        }

        /* Graphs Image Stacked */
        .images-grid {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-bottom: 30px;
        }

        .image-card {
            background-color: #161b22;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, border-color 0.2s;
        }

        .image-card:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        .image-card-header {
            padding: 12px 15px;
            background-color: rgba(22, 27, 34, 0.8);
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
            text-align: center;
            cursor: pointer;
            position: relative;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image-card-header::after {
            content: '▾';
            position: absolute;
            right: 20px;
            font-size: 1.1rem;
            color: var(--text-muted);
            transition: transform 0.2s;
        }

        .image-card.collapsed .image-card-header::after {
            transform: rotate(-90deg);
        }

        .image-card.collapsed .image-container {
            display: none;
        }

        .image-container {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #070a0e;
            padding: 20px;
            min-height: 500px;
            position: relative;
            cursor: pointer;
        }

        .image-container img {
            max-width: 100%;
            max-height: 700px;
            object-fit: contain;
            border-radius: 4px;
            transition: filter 0.2s;
        }

        .image-container:hover img {
            filter: brightness(1.15);
        }

        .image-missing {
            color: var(--text-muted);
            font-size: 0.85rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .image-missing svg {
            width: 32px;
            height: 32px;
            stroke: var(--text-muted);
            fill: none;
        }

        /* Diagnosis panel */
        .diagnosis-card {
            background-color: rgba(240, 136, 62, 0.05);
            border: 1px solid rgba(240, 136, 62, 0.2);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .diagnosis-card h4 {
            color: var(--accent-orange);
            font-size: 1.1rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .diagnosis-card p {
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .solutions-list {
            padding-left: 20px;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .solutions-list li {
            margin-bottom: 8px;
        }

        /* Fullscreen Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
        }

        .modal-content img {
            width: 100%;
            height: auto;
            max-height: 85vh;
            object-fit: contain;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }

        .modal-caption {
            position: absolute;
            bottom: 20px;
            color: #fff;
            font-size: 1.1rem;
            background: rgba(0,0,0,0.6);
            padding: 5px 15px;
            border-radius: 6px;
        }
    </style>
</head>

        function getScoreClass(scoreStr) {
            if (!scoreStr) return 'low';
            const num = parseFloat(scoreStr.replace('%', ''));
            if (num >= 95) return 'high';
            if (num >= 80) return 'med';
            return 'low';
        }

        function createSidebar() {
            const list = document.getElementById('videoList');
            
            const usableVideos = videoData.filter(v => !v.is_invalid_gt && !v.is_validation_only);
            const excludedVideos = videoData.filter(v => v.is_invalid_gt || v.is_validation_only);

            const addSectionHeader = (title) => {
                const li = document.createElement('li');
                li.style.padding = '15px 20px 5px 20px';
                li.style.fontSize = '0.75rem';
                li.style.textTransform = 'uppercase';
                li.style.fontWeight = 'bold';
                li.style.color = 'var(--accent-orange)';
                li.style.borderBottom = '1px solid var(--border-color)';
                li.style.cursor = 'default';
                li.innerText = title;
                list.appendChild(li);
            };

            if (usableVideos.length > 0) {
                addSectionHeader('Evaluación Core (Válidos)');
                usableVideos.forEach(video => addVideoItem(video, list));
            }

            if (excludedVideos.length > 0) {
                addSectionHeader('Validación / Excluidos');
                excludedVideos.forEach(video => addVideoItem(video, list));
            }
        }

        function addVideoItem(video, list) {
            const li = document.createElement('li');
            li.className = 'video-item';
            li.setAttribute('data-id', video.code);
            li.setAttribute('data-title', video.title.toLowerCase());
            
            const score = video.parsimonious.svc_f1 || video.std.svc_f1 || 'N/A';
            const isPerfect = score === '100.0%';
            const badgeClass = isPerfect ? 'video-item-badge perfect' : 'video-item-badge';
            
            let labelText = isPerfect ? '100% Perfecto' : 'F1: ' + score;
            if (video.is_invalid_gt) {
                labelText = 'Excluido (GT Inválido)';
            } else if (video.is_validation_only) {
                labelText = 'Solo Validación';
            }

            li.innerHTML = `
                <div class="video-item-id">${video.code}</div>
                <div class="video-item-title">${video.title}</div>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <span class="${badgeClass}">${labelText}</span>
                    <span class="video-item-badge" style="font-size:0.65rem">${video.categories.split(',')[0]}</span>
                </div>
            `;
            li.addEventListener('click', () => selectVideo(video.code));
            list.appendChild(li);
        }

        function buildDiagnosis(video) {
            const code = video.code;
            const p = video.parsimonious;
            const s = video.std;
            
            // Heuristic analysis based on metrics
            let diagnosis = "";
            let solutions = [];
            
            const pF1 = p.svc_f1 ? parseFloat(p.svc_f1) : 0;
            const sF1 = s.svc_f1 ? parseFloat(s.svc_f1) : 0;
            const pEdgeF1 = p.edge_f1 ? parseFloat(p.edge_f1) : 0;
            const sEdgeF1 = s.edge_f1 ? parseFloat(s.edge_f1) : 0;
            
            if (pF1 === 100 && sF1 === 100) {
                diagnosis = "Ambos modelos identificaron correctamente todos los servicios (nodos) del diagrama. El rendimiento en identificación es perfecto.";
                if (pEdgeF1 < 100 || sEdgeF1 < 100) {
                    diagnosis += " Sin embargo, existen diferencias o fallos en las conexiones (arcos) o en su secuencia temporal.";
                    solutions.push("<strong>Revisar marcas de secuencia (sequence labels)</strong>: La API de Gemini a veces interpreta mal el orden numérico (ej. '1' vs '1.0' o saltándose números) o no sigue correctamente las conexiones visuales de las flechas.");
                    solutions.push("<strong>Filtro de simplificación de etiquetas de yEd</strong>: La versión clásica incluye comentarios largos en las flechas que causan solapamiento visual y dificultan la validación manual.");
                } else {
                    diagnosis += " La coincidencia de flujos (edges) también es excelente.";
                    solutions.push("<strong>Sin acción requerida</strong>: Este caso demuestra un éxito total en ambos pipelines.");
                }
            } else if (pF1 > sF1) {
                diagnosis = `El pipeline Parsimonioso mejoró la precisión/recall del servicio en un <strong>${(pF1 - sF1).toFixed(1)}%</strong> en comparación con el Clásico. Esto se debe a que la simplificación del prompt y la reducción de descripciones ad-hoc evitaron alucinaciones comunes de servicios.`;
                if (s.hallucinated && s.hallucinated !== "Ninguno") {
                    solutions.push(`<strong>Controlar Alucinaciones en Clásico</strong>: El clásico alucinó servicios como: <code>${s.hallucinated}</code>. Esto ocurre porque el prompt clásico de Gemini da demasiado peso a la transcripción de audio, asumiendo componentes que se mencionaron pero que no están dibujados en la pizarra.`);
                }
                solutions.push("<strong>Filtro de Oclusión y Contorno</strong>: Usar la mejor pizarra con menor oclusión para asegurar que los logos de AWS sean nítidamente detectados en lugar de ser bloqueados por el presentador.");
            } else {
                diagnosis = "Ambos modelos tienen un rendimiento similar o el pipeline clásico capturó detalles que el parsimonioso omitió.";
                if (p.missing && p.missing !== "Ninguno") {
                    solutions.push(`<strong>Servicios Faltantes en Parsimonious</strong>: El modelo omitió <code>${p.missing}</code>. Esto se soluciona ajustando las plantillas de template matching de logos o reforzando el prompt para prestar atención a subgrafos pequeños.`);
                }
                if (pEdgeF1 < 50) {
                    solutions.push("<strong>Mejorar las reglas de inferencia de flujos</strong>: El modelo detecta los servicios pero no conecta la secuencia lógica del flujo de datos.");
                }
            }
            
            if (solutions.length === 0) {
                solutions.push("Revisión visual de los gráficos manuales para verificar si hay etiquetas de flujo faltantes o mal alineadas.");
            }

            return `
                <div class="diagnosis-card">
                    <h4>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                        Análisis de Fallas & Diagnóstico
                    </h4>
                    <p>${diagnosis}</p>
                    <ul class="solutions-list">
                        ${solutions.map(s => `<li>${s}</li>`).join('')}
                    </ul>
                </div>
            `;
        }

                        <div class="image-card-header" onclick="toggleCard(this)" style="background-color: rgba(240, 136, 62, 0.2); border-color: rgba(240, 136, 62, 0.4);">Pizarra de Entrada (best_whiteboard.jpg)</div>
                        <div class="image-container" onclick="openModal('${video.images.pizarra}', 'Pizarra Analizada - ${video.title}')">
                            ${video.images.pizarra ? `<img src="${video.images.pizarra}" alt="Pizarra Analizada">` : `
                                <div class="image-missing">
                                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                                    <span>Imagen no disponible (no se encontró best_whiteboard.jpg)</span>
                                </div>
                            `}
                        </div>
                    </div>

                    <div class="image-card">
                        <div class="image-card-header" onclick="toggleCard(this)">Ground Truth Manual (_cloud.png)</div>
                        <div class="image-container" onclick="openModal('${video.images.cloud}', 'Ground Truth - ${video.title}')">
                            ${video.images.cloud ? `<img src="${video.images.cloud}" alt="Ground Truth">` : `
                                <div class="image-missing">
                                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                                    <span>Imagen no disponible</span>
                                </div>
                            `}
                        </div>
                    </div>

                    <div class="image-card">
                        <div class="image-card-header" onclick="toggleCard(this)">Gemini Parsimonious (_vision.png)</div>
                        <div class="image-container" onclick="openModal('${video.images.vision}', 'Gemini Parsimonious - ${video.title}')">
                            ${video.images.vision ? `<img src="${video.images.vision}" alt="Gemini Parsimonious">` : `
                                <div class="image-missing">
                                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                                    <span>Imagen no disponible</span>
                                </div>
                            `}
                        </div>
                    </div>

                    <div class="image-card">
                        <div class="image-card-header" onclick="toggleCard(this)">Standard Gemini (da más importancia al texto) (_gem.png)</div>
                        <div class="image-container" onclick="openModal('${video.images.gem}', 'Standard Gemini - ${video.title}')">
                            ${video.images.gem ? `<img src="${video.images.gem}" alt="Standard Gemini">` : `
                                <div class="image-missing">
                                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                                    <span>Imagen no disponible</span>
                                </div>
                            `}
                        </div>
                    </div>
                </div>
            `;

            // Replace main content with current metrics/images
            const existingPanel = document.getElementById('activeVideoPanel');
            if (existingPanel) {
                existingPanel.innerHTML = metricsHtml;
            } else {
                const div = document.createElement('div');
                div.id = 'activeVideoPanel';
                div.innerHTML = metricsHtml;
                mainContent.appendChild(div);
            }
            
            // Scroll back to top
            mainContent.scrollTop = 0;
        }

        function toggleCard(headerElement) {
            const card = headerElement.parentElement;
            card.classList.toggle('collapsed');
        }

        // Search functionality
        document.getElementById('search').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const items = document.querySelectorAll('.video-item');
            items.forEach(item => {
                const id = item.getAttribute('data-id').toLowerCase();
                const title = item.getAttribute('data-title');
                if (id.includes(query) || title.includes(query)) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        });

        // Image Modal Actions
        function openModal(imgSrc, caption) {
            if (!imgSrc || imgSrc === 'null') return;
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImg');
            const modalCaption = document.getElementById('modalCaption');
            modal.style.display = "flex";
            modalImg.src = imgSrc;
            modalCaption.innerText = caption;
        }

        function closeModal() {
            document.getElementById('imageModal').style.display = "none";
        }

        // Initialize Page
        createSidebar();
        // Select first video by default
        if (videoData.length > 0) {
            selectVideo(videoData[0].code);
        }
    </script>
</body>
</html>
